<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的學習樂園</title>
    <style>
        :root {
            --primary-pink: #ffafbd;
            --primary-orange: #ffc3a0;
            --bg-color: #fff9f0;
            --text-color: #5d5d5d;
            --card-bg: #ffffff;
            --accent-blue: #a1c4fd;
            --accent-green: #c2e9fb;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 50px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #ff8a80;
            letter-spacing: 2px;
        }

        /* SVG 圖示基礎樣式 */
        .svg-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            transition: transform 0.5s ease;
        }

        /* 讓 SVG 動起來 */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 40px 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 260px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(255, 175, 189, 0.4);
        }

        .card:hover .svg-icon {
            animation: float 2s infinite ease-in-out;
        }

        .card h2 {
            margin: 10px 0;
            font-size: 1.4rem;
            color: #444;
        }

        .card p {
            font-size: 0.95rem;
            color: #888;
            line-height: 1.5;
        }

        .btn {
            margin-top: 20px;
            padding: 8px 30px;
            background: linear-gradient(135deg, var(--primary-pink), var(--primary-orange));
            color: white;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 175, 189, 0.4);
        }

        footer {
            margin-top: auto;
            padding: 30px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <header>
        <h1>🧁 學習小基地 🧁</h1>
        <p style="color: #9e9e9e;">探索新知識，每天進步一點點！</p>
    </header>

    <div class="container">

        <a href="caculate.html" class="card">
            <svg class="svg-icon" viewBox="0 0 100 100">
                <rect x="10" y="10" width="80" height="80" rx="15" fill="#a1c4fd" />
                <rect x="20" y="20" width="60" height="40" rx="5" fill="#fff" />
                <path d="M30 75 H70 M50 65 V85" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
                <circle cx="25" cy="25" r="3" fill="#ffafbd" />
            </svg>
            <h2>18以內加減法</h2>
            <p>算術小達人就是你！</p>
            <div class="btn">出發</div>
        </a>

        <a href="atandagain.html" class="card">
            <svg class="svg-icon" viewBox="0 0 100 100">
                <path d="M20 20 L80 20 L80 80 L20 80 Z" fill="#ffc3a0" />
                <path d="M20 20 L50 10 L80 20" fill="#ffafbd" />
                <rect x="35" y="35" width="30" height="5" rx="2" fill="#fff" />
                <rect x="35" y="50" width="30" height="5" rx="2" fill="#fff" />
                <rect x="35" y="65" width="20" height="5" rx="2" fill="#fff" />
            </svg>
            <h2>分別在與再</h2>
            <p>字字珠璣，不再寫錯字。</p>
            <div class="btn">出發</div>
        </a>

    </div>

    <footer>
        - Keep Growing -
    </footer>

</body>
</html>
